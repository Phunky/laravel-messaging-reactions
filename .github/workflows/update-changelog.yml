name: "Update Changelog"

on:
  release:
    types: [released]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: master

      # Always use the git tag for `latest-version` — `release.name` is often empty (no title), which
      # makes the CLI abort. Use a multiline block for `release-notes` so the body does not break Docker
      # arg passing to the action's entrypoint.sh (which would leave `--latest-version` empty).
      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1.12.0
        with:
          latest-version: ${{ github.event.release.tag_name }}
          release-notes: |
            ${{ github.event.release.body }}

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          branch: master
          commit_message: Update CHANGELOG
          file_pattern: CHANGELOG.md
