name: run-tests

on:
  push:
    paths:
      - "**.php"
      - ".github/workflows/run-tests.yml"
      - "phpunit.xml.dist"
      - "composer.json"
      - "composer.lock"
  pull_request:
    paths:
      - "**.php"
      - ".github/workflows/run-tests.yml"
      - "phpunit.xml.dist"
      - "composer.json"
      - "composer.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.4"
            testbench: "^11.0"
            illuminate: "^13.0"

    name: PHP ${{ matrix.php }} (Illuminate ${{ matrix.illuminate }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo
          coverage: none

      - name: Require matrix dependency versions
        run: |
          composer require --dev --no-ansi --no-interaction --no-progress --no-update \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer require --no-ansi --no-interaction --no-progress --no-update \
            "illuminate/contracts:${{ matrix.illuminate }}" \
            "illuminate/database:${{ matrix.illuminate }}" \
            "illuminate/events:${{ matrix.illuminate }}" \
            "illuminate/support:${{ matrix.illuminate }}"

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest --ci
